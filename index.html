<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Multcabos - Rede & Telecom</title>
  <link rel="shortcut icon" type="image/png" href="img/mini-logo.jpg"/>
</head>
<style>
   @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@400;500;700&display=swap');

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}
body {
  background: #fff;
  font-family: 'Roboto', sans-serif;
  color: #4a4a4a;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 15px 12px 35px;
  overflow-x: hidden;
  line-height: 1.5;
}
a {
  text-decoration: none;
  color: #474747;
  transition: color 0.3s ease;
  font-weight: 600;
}
a:hover, a:focus {
  color: #3a3838;
  outline: none;
}

/* Estilos para o ícone Hambúrguer */
.celular {
  display: none; /* Escondido por padrão (será mostrado em telas menores) */
  cursor: pointer;
  padding: 10px; /* Área de clique maior */
  background-color: transparent; /* Remove qualquer fundo padrão de botão */
  border: none; /* Remove qualquer borda padrão de botão */
  z-index: 1005; /* Garante que o botão esteja acima de outros elementos da nav */
}

.celular span {
  display: block;
  width: 25px;
  height: 3px;
  background-color: #333333; /* Cor das barras do hambúrguer */
  margin: 5px 0;
  transition: all 0.3s ease-in-out;
}

/* Animação para X quando o menu está ativo (classe .active no .hamburger) */
.celular.active span:nth-child(1) {
  transform: translateY(8px) rotate(45deg);
}

.celular.active span:nth-child(2) {
  opacity: 0;
}

.celular.active span:nth-child(3) {
  transform: translateY(-8px) rotate(-45deg);
}

/* Navegação*/
nav {
  width: 100%;
  max-width: 960px;
  background:
    linear-gradient(135deg, #ffffff, #ffffff 90%);
  border-radius: 0 0 18px 18px;
  padding: 20px 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: none;
}
.logo {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 2.2rem;
  color: #555555;
  cursor: default;
  letter-spacing: 3px;
  user-select: none;
  text-shadow: none;
}
/* CSS existente para nav ul (desktop) - Mantenha como está */
nav ul {
  list-style: none;
  display: flex;
  gap: 26px;
}
nav ul li a {
  font-weight: 700;
  font-size: 1.05rem;
  padding: 8px 12px;
  border-radius: 10px;
  color: #353434;
  transition:
    background-color 0.35s ease,
    color 0.35s ease;
}
nav ul li a:hover, nav ul li a:focus {
  background-color: #a9a9a9;
  color: #fff;
  outline: none;
}
nav ul li a::before {
  content: none;
}

/* Header */
header {
  max-width: 960px;
  text-align: center;
  margin: 45px auto 40px;
  user-select: none;
  padding: 0 10px;
}
header h1 {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 2.8rem;
  color: #000000;
  text-shadow: none;
  letter-spacing: 4px;
  line-height: 1.1;
}
header p {
  margin-top: 12px;
  font-size: 1.3rem;
  font-weight: 500;
  color: #292828;
  max-width: 720px;
  margin-left: auto;
  margin-right: auto;
  text-shadow: none;
}
.tagline {
  margin-top: 10px;
  font-family: 'Roboto', sans-serif;
  font-size: 1rem;
  font-style: italic;
  letter-spacing: 1.8px;
  color: #575555;
  text-shadow: none;
}

/* Main container */
main {
  width: 100%;
  max-width: 960px;
  display: flex;
  justify-content: center;
  gap: 48px;
  flex-wrap: wrap;
  user-select: none;
  padding: 0 10px;
}

/* Sections */
section {
  position: relative;
  flex: 1 1 420px;
  min-width: 320px;
  border-radius: 20px;
  color: #4a4a4a;
  padding: 36px 36px 40px;
  background: linear-gradient(135deg, #f9f9f9cc 0%, #f4f4f4cc 0%);
  box-shadow: none;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.3s ease;
}
section:hover, section:focus-within {
  transform: translateY(-6px);
  outline: none;
}

section::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 20px;
  background: rgba(114, 111, 111, 0.1);
  backdrop-filter: blur(6px);
  transition: background 0.4s ease, backdrop-filter 0.3s ease;
  z-index: 0;
}
section:hover::before,
section:focus-within::before {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(0);
}

/* Imagem de fundo das sections*/
section.services {
  background-image:
    url('img/fachada.jpeg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
section.products {
  background-image:
    url('img/conectores2.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

section h2 {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 2.6rem;
  margin-bottom: 36px;
  letter-spacing: 2.4px;
  color: #3f3d3d;
  text-shadow: none;
  position: relative;
  z-index: 1;
}

/* Links dentro das sections */
.site-link {
  background: #f2f2f2;
  border-radius: 18px;
  padding: 18px 24px;
  margin-bottom: 22px;
  color: #333333;
  font-weight: 700;
  font-size: 1.25rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition:
    background-color 0.3s ease,
    color 0.3s ease,
    transform 0.22s ease;
  position: relative;
  z-index: 1;
  cursor: pointer;
  box-shadow: none;
  text-shadow: none;
}
.site-link:last-child {
  margin-bottom: 0;
}
.site-link:hover,
.site-link:focus {
  background-color: #ccc;
  color: #333;
  transform: scale(1.05);
  outline: none;
  text-shadow: none;
}
.site-link .arrow {
  font-weight: 900;
  font-size: 1.8rem;
  color: #666666;
  transition: transform 0.3s ease, color 0.3s ease;
  user-select: none;
  z-index: 2;
}
.site-link:hover .arrow,
.site-link:focus .arrow {
  transform: translateX(9px);
  color: #333;
}

.site-link .link-content {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-grow: 1;
  z-index: 2;
}

.icon {
  width: 30px;
  height: 30px;
  flex-shrink: 0;
  filter: none;
  transition: none;
  fill: #7a7a7a;
}

.site-link:hover .icon,
.site-link:focus .icon {
  fill: #444;
}

/* Footer */
footer {
  margin-top: 50px;
  color: #242323;
  font-size: 0.9rem;
  max-width: 960px;
  text-align: center;
  user-select: none;
  font-weight: 500;
  letter-spacing: 0.9px;
  text-shadow: none;
  padding: 0 10px;
}
footer p + p {
  margin-top: 12px;
  font-style: italic;
  font-weight: 400;
  color: #5a5a5a;
}
footer a {
  color: #6b6b6b;
  font-weight: 600;
  text-shadow: none;
}
footer a:hover,
footer a:focus {
  color: #444;
  outline: none;
  text-shadow: none;
}

@media (max-width: 680px) {
  /* ... (outros estilos responsivos que você já tem) ... */

  nav {
    /* padding: 12px 20px;  // Você já tem isso */
    /* Garante que o contexto de posicionamento para o menu dropdown esteja correto */
    position: sticky; /* ou relative, se sticky não for desejado para o menu dropdown */
  }

  .celular {
    display: block; /* Mostra o ícone de hambúrguer em telas menores */
  }

  nav ul {
    /* Esconde o menu por padrão em telas menores */
    display: none;

    /* Estilização do menu quando aberto (.open) */
    flex-direction: column;
    position: absolute;
    top: 100%; /* Posiciona abaixo da barra de navegação */
    left: 0;
    width: 100%; /* Ocupa toda a largura da barra de navegação */
    background: #ffffff; /* Fundo do menu dropdown */
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* Sombra para destacar o menu */
    border-radius: 0 0 18px 18px; /* Mantém o arredondamento da nav, se desejado */
    padding: 10px 0; /* Espaçamento interno vertical */
    z-index: 1000; /* Garante que o menu fique sobre o conteúdo da página */

    /* Remove o gap horizontal e prepara para itens de lista verticais */
    gap: 0; 
  }

  nav ul.open {
    display: flex; /* Mostra o menu quando a classe .open é adicionada via JS */
  }

  nav ul li {
    width: 100%; /* Faz cada item da lista ocupar a largura total */
    text-align: center; /* Centraliza o texto dos links, se desejar */
  }

  nav ul li a {
    /* font-size: 1rem; // Você já tem */
    padding: 15px 20px; /* Ajusta o padding para melhor toque em mobile */
    display: block; /* Faz o link ocupar todo o espaço do <li> */
    border-radius: 0; /* Remove bordas arredondadas individuais se não quiser */
  }
  nav ul li a:hover, nav ul li a:focus {
    background-color: #e9e9e9; /* Cor de hover um pouco diferente para o dropdown */
    color: #333;
  }
}

</style>
<body>

  <nav>
    <div class="logo" aria-label="Multcabos logo"><img src="img/logo-multcabos.png" alt="Logo da Multcabos"></div>
    <div class="celular" aria-label="Abrir menu de navegação" role="button" tabindex="0" aria-expanded="false">
      <span></span><span></span><span></span>
    </div>
    <ul role="menubar" aria-label="Navegação principal">
      <li role="none"><a role="menuitem" href="#servicos">Serviços</a></li>
      <li role="none"><a role="menuitem" href="https://multcabos.com.br/produtos/">Produtos</a></li>
      <li role="none"><a role="menuitem" href="https://multcabos.com.br/#contato">Contato</a></li>
    </ul>
  </nav>

<header>
  <h1>Desde de 1992</h1>
  <p>Conectando você ao futuro das redes e telecomunicações.</p>
  <div class="tagline"></div>
</header>

<main>
  <section id="servicos" class="services" tabindex="0" aria-label="Seção de serviços de manutenção e redes">
    <h2>Serviços</h2>

    <a href="#" class="site-link" target="_blank" rel="" aria-label="Acessar Fiverr serviços freelancers">
      <span class="link-content">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M19 5v14H5V5h14m0-2H5c-1.11 0-2 .89-2 2v14c0 1.11.89 2 2 2h14c1.11 0 2-.89 2-2V5c0-1.11-.89-2-2-2zM7 15h2v-2H7v2zm0-4h2v-2H7v2zm4 4h6v-2h-6v2zm0-4h6v-2h-6v2z" fill="currentColor"/>
        </svg>
        Cabeamentos 
      </span>
      <span class="arrow">→</span>
    </a>

    <a href="#" class="site-link" target="_blank" rel="" aria-label="">
      <span class="link-content">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M21.5 2l-7.5 13h4l3-5-2.5-8zM3 8h4l2 12H6l-3-12zm14.3 0l-3.1 5.8L18 18h3.8l-4.5-10z" fill="currentColor"/>
        </svg>
        CFTV 
      </span>
      <span class="arrow">→</span>
    </a>

    <a href="#" class="site-link" target="_blank" rel="" aria-label="">
      <span class="link-content">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 2L3.5 7.5v9L12 22l8.5-5.5v-9z" fill="currentColor"/>
        </svg>
        Montagem De Racks
      </span>
      <span class="arrow">→</span>
    </a>
  </section>

  <section id="produtos" class="products" tabindex="0" aria-label="Seção de produtos como switches e equipamentos de rede">
    <h2>Produtos</h2>

    <a href="#" class="site-link" target="_blank" rel="" aria-label="">
      <span class="link-content">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 4L6 20h12l-6-16zM11 18h2v-6h-2v6z" fill="currentColor"/>
        </svg>
        DIO
      </span>
      <span class="arrow">→</span>
    </a>

    <a href="#" class="site-link" target="_blank" rel="" aria-label="">
      <span class="link-content">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M19 20H5v-2h14v2zm0-9H5v5h14v-5zm-3-4H8v2h8V7z" fill="currentColor"/>
        </svg>
        Bandejas
      </span>
      <span class="arrow">→</span>
    </a>

    <a href="#" class="site-link" target="_blank" rel="" aria-label="">
      <span class="link-content">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="10" fill="currentColor"/>
        </svg>
        Switches
      </span>
      <span class="arrow">→</span>
    </a>
  </section>
</main>

<footer id="contato">
  <p>© 2024 Multcabos| contato@multcabos.com.br | +55 43 3305-7777</p>
  <p>Siga-nos:
    <a href="https://www.facebook.com/multcabos/" aria-label="Link para Facebook">Facebook</a> • 
    <a href="https://www.instagram.com/multcabos_/" aria-label="Link para LinkedIn">Instagram</a> • 
  </p>
</footer>

<script>
  const celular = document.querySelector('.celular');
  const navMenu = document.querySelector('nav ul');

  celular.addEventListener('click', () => {
    const expanded = celular.getAttribute('aria-expanded') === 'true' || false;
    celular.classList.toggle('active');
    celular.setAttribute('aria-expanded', !expanded);
    navMenu.classList.toggle('open');
  });

  celular.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      celular.click();
    }
  });
</script>

</body>
</html>
